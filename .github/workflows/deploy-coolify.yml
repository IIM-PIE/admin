name: Deploy to Coolify

# Workflow unifié pour les deux environnements Coolify (prod + preprod).
# Se déclenche sur push `main` (prod) et push `preprod` (preprod).
#
# Architecture :
#   1. BUILD l'image (Vite build → nginx) + PUSH sur GHCR
#      → logs de BUILD visibles ICI (npm ci, vite build…)
#   2. PATCH Coolify pour épingler l'app sur le tag précis
#   3. Trigger le déploiement + poll le statut
#
# Différences entre les 2 environnements :
#   - `main` cible l'app `pie-admin` (prod), tag image = `<sha>` + `latest`,
#     secret `COOLIFY_WEBHOOK_URL` + build-arg `VITE_API_URL` (prod).
#   - `preprod` cible l'app `pie-admin-preprod`, tag = `preprod-<sha>` + `preprod`,
#     secret `COOLIFY_WEBHOOK_URL_PREPROD` + build-arg `VITE_API_URL_PREPROD`.
#
# VITE_API_URL est BUILD-TIME : Vite la compile dans le bundle JS. Une même
# image ne peut donc pas viser deux backends → une build par environnement.
# Pas de migrations DB : c'est un front statique qui consomme l'API NestJS.

on:
  push:
    branches:
      - main
      - preprod

env:
  IMAGE: ghcr.io/iim-pie/admin
  COOLIFY_HOST: https://coolify.51.83.77.73.sslip.io

jobs:
  build-and-push:
    name: Build & push Docker image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Le build tourne ICI → toute la sortie (npm ci, vite build…) est visible.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ github.ref == 'refs/heads/main' && secrets.VITE_API_URL || secrets.VITE_API_URL_PREPROD }}
            VITE_SENTRY_DSN=${{ github.ref == 'refs/heads/main' && secrets.VITE_SENTRY_DSN || secrets.VITE_SENTRY_DSN_PREPROD }}
            VITE_SENTRY_ENVIRONMENT=${{ github.ref == 'refs/heads/main' && 'production' || 'preprod' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.ref == 'refs/heads/main' && github.sha || format('preprod-{0}', github.sha) }}
            ${{ env.IMAGE }}:${{ github.ref == 'refs/heads/main' && 'latest' || 'preprod' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-coolify:
    name: Deploy on Coolify
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "webhook_url=${{ secrets.COOLIFY_WEBHOOK_URL }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "env_label=prod" >> "$GITHUB_OUTPUT"
          else
            echo "webhook_url=${{ secrets.COOLIFY_WEBHOOK_URL_PREPROD }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=preprod-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "env_label=preprod" >> "$GITHUB_OUTPUT"
          fi

      - name: Point Coolify app to the freshly built image
        run: |
          APP_UUID=$(echo "${{ steps.env.outputs.webhook_url }}" | grep -oE 'uuid=[^&]+' | cut -d= -f2)
          if [ -z "$APP_UUID" ]; then
            echo "::error::Impossible d'extraire l'app UUID depuis le webhook URL"
            exit 1
          fi
          echo "env=${{ steps.env.outputs.env_label }} · app=$APP_UUID → image ${{ env.IMAGE }}:${{ steps.env.outputs.image_tag }}"
          curl -fSsL -X PATCH \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ env.COOLIFY_HOST }}/api/v1/applications/$APP_UUID" \
            -d "{\"docker_registry_image_tag\": \"${{ steps.env.outputs.image_tag }}\"}" > /dev/null
          echo "✅ tag d'image mis à jour côté Coolify"

      - name: Trigger Coolify deployment
        id: trigger
        run: |
          RESPONSE=$(curl -fSsL -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "${{ steps.env.outputs.webhook_url }}")
          echo "Response: $RESPONSE"
          DEPLOYMENT_UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid // empty')
          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "::error::Pas de deployment_uuid dans la réponse Coolify"
            exit 1
          fi
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"
          echo "🚀 Déploiement ${{ steps.env.outputs.env_label }} déclenché : $DEPLOYMENT_UUID"

      - name: Wait for Coolify deployment
        run: |
          DEPLOY_UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          for i in $(seq 1 60); do
            STATUS=$(curl -fSsL \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
              "${{ env.COOLIFY_HOST }}/api/v1/deployments/$DEPLOY_UUID" 2>/dev/null \
              | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            echo "[$i/60] Deploy status: $STATUS"
            case "$STATUS" in
              finished|success)
                echo "::notice::✅ Déploiement ${{ steps.env.outputs.env_label }} terminé avec succès"
                exit 0
                ;;
              failed|error|cancelled-by-user)
                echo "::error::❌ Déploiement ${{ steps.env.outputs.env_label }} a échoué (status=$STATUS)"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::⏱ Timeout après 10 minutes"
          exit 1
