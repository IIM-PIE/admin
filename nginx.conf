server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression des assets texte
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets hashés par Vite (/assets/...) → cache long immuable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback : toute route non-fichier renvoie index.html
    # (indispensable pour le routing client @tanstack/react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
